<!DOCTYPE html>  <html lang="ar" dir="rtl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>المهندس ربيع شعلول | Rabie Shalool</title>  
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">  
    <style>  
        :root {  
            --primary-color: #00d2ff;  
            --secondary-color: #3a7bd5;  
            --glass-bg: rgba(255, 255, 255, 0.08);  
            --glass-border: rgba(255, 255, 255, 0.15);  
            --text-color: #e0e0e0;  
        }  body {  
        font-family: 'Tajawal', sans-serif;  
        margin: 0;  
        min-height: 100vh;  
        display: flex;  
        flex-direction: column;  
        align-items: center;  
        color: var(--text-color);  
        overflow-x: hidden;  
        /* خلفية متدرجة حديثة */  
        background: radial-gradient(circle at center, #1a2a3a 0%, #0d1a2a 100%);  
        padding-bottom: 50px;  
    }  

    /* تأثير الحركة في الخلفية */  
    body::before {  
        content: "";  
        position: fixed;  
        top: 0; left: 0; width: 100%; height: 100%;  
        background: radial-gradient(circle at 70% 30%, rgba(0, 210, 255, 0.1) 0%, transparent 60%);  
        z-index: -1;  
        animation: backgroundPulse 10s infinite alternate;  
    }  

    header {  
        text-align: center;  
        padding: 80px 20px 40px;  
        animation: fadeInDown 1s ease;  
        display: flex;  
        flex-direction: column;  
        align-items: center;  
    }  

    /* تنسيق صورة الملف الشخصي الدائرية */  
    .profile-container {  
        width: 150px;  
        height: 150px;  
        border-radius: 50%;  
        border: 4px solid #fff; /* حدود بيضاء */  
        overflow: hidden;  
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.6); /* هالة زرقاء مضيئة */  
        margin-bottom: 25px;  
        transition: 0.3s ease;  
    }  
    .profile-container:hover {  
        transform: scale(1.05);  
        box-shadow: 0 0 50px rgba(0, 210, 255, 0.8);  
    }  
    .profile-img {  
        width: 100%;  
        height: 100%;  
        object-fit: cover; /* لضمان ملء الدائرة دون تشويه */  
    }  

    /* تنسيق الاسم المماثل للمثال */  
    h1 {  
        font-size: 3.2rem;  
        margin: 0;  
        font-weight: 700;  
    }  
    .greeting {  
        color: #fff;  
    }  
    .name-highlight {  
        background: linear-gradient(to right, var(--primary-color), var(--secondary-color));  
        -webkit-background-clip: text;  
        -webkit-text-fill-color: transparent;  
    }  

    .tagline {  
        font-size: 1.3rem;  
        opacity: 0.9;  
        margin-top: 15px;  
        font-weight: 300;  
    }  
    .languages {  
        color: var(--primary-color);  
        font-weight: 500;  
    }  

    .main-container {  
        width: 92%;  
        max-width: 950px;  
        background: var(--glass-bg);  
        backdrop-filter: blur(20px);  
        -webkit-backdrop-filter: blur(20px);  
        border: 1px solid var(--glass-border);  
        border-radius: 24px;  
        padding: 50px;  
        margin-bottom: 50px;  
        box-shadow: 0 25px 60px rgba(0,0,0,0.4);  
        animation: fadeInUp 1s ease 0.3s;  
        animation-fill-mode: both;  
    }  

    .section { margin-bottom: 45px; }  
    .section h2 {  
        font-size: 2rem;  
        color: #fff;  
        margin-bottom: 30px;  
        display: flex;  
        align-items: center;  
        gap: 15px;  
    }  
    .section-icon {  
        color: var(--primary-color);  
    }  

    /* النبذة التعريفية الجديدة والمعدلة */  
    .bio {  
        font-size: 1.15rem;  
        line-height: 1.9;  
        color: rgba(255, 255, 255, 0.9);  
        margin-top: 20px;  
    }  

    .project-grid {  
        display: grid;  
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));  
        gap: 25px;  
        margin-top: 30px;  
    }  

    .card {  
        background: rgba(255, 255, 255, 0.04);  
        border: 1px solid var(--glass-border);  
        border-radius: 18px;  
        padding: 30px;  
        transition: all 0.3s ease;  
        position: relative;  
        overflow: hidden;  
        display: flex;  
        flex-direction: column;  
        justify-content: space-between;  
    }  

    .card:hover {  
        transform: translateY(-12px);  
        background: rgba(255, 255, 255, 0.08);  
        border-color: var(--primary-color);  
        box-shadow: 0 15px 40px rgba(0, 210, 255, 0.2);  
    }  

    .card h3 {   
        color: #fff;   
        margin-top: 0;   
        font-size: 1.4rem;  
        display: flex;  
        align-items: center;  
        gap: 1
