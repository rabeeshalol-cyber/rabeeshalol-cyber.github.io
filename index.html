<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهندس ربيع شعلول | Rabie Shalool</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="profile.jpg">

    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            background: radial-gradient(circle at center, #1a2a3a 0%, #0d1a2a 100%);
        }

        header {
            text-align: center;
            padding: 60px 15px 30px;
        }

        .profile-container {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #fff;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2.2rem;
        }

        .name-highlight {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            width: 92%;
            max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: white;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            color: white;
            text-decoration: none;
            border-radius: 15px;
        }

        /* المهارات */
        .skill {
            margin-bottom: 12px;
        }

        .skill-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        .skill-progress {
            height: 8px;
            width: 0;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: 1.5s;
        }

        /* التواصل */
        .contact {
            text-align: center;
        }

        .contact a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <div class="profile-container">
        <img src="profile.jpg" class="profile-img" alt="صورة ربيع شعلول">
    </div>
    <h1>مرحباً، أنا <span class="name-highlight">ربيع شعلول</span></h1>
    <p>طالب هندسة حاسوب</p>
</header>

<div class="main-container">

    <!-- من أنا -->
    <div class="section">
        <h2>من أنا</h2>
        <p>طالب هندسة حاسوب مهتم بالبرمجة والأنظمة المدمجة والذكاء الاصطناعي.</p>
    </div>

    <!-- المهارات -->
    <div class="section">
        <h2>⚙️ مهاراتي</h2>

        <div class="skill">
            <p>Python</p>
            <div class="skill-bar">
                <div class="skill-progress" data-skill="85%"></div>
            </div>
        </div>

        <div class="skill">
            <p>C++</p>
            <div class="skill-bar">
                <div class="skill-progress" data-skill="75%"></div>
            </div>
        </div>

        <div class="skill">
            <p>Electronics</p>
            <div class="skill-bar">
                <div class="skill-progress" data-skill="80%"></div>
            </div>
        </div>
    </div>

    <!-- المشاريع -->
    <div class="section">
        <h2>المشاريع</h2>
        <div class="project-grid">
            <div class="card">
                <h3>كاشف المعادن</h3>
                <a href="#" class="btn">قريباً</a>
            </div>

            <div class="card">
                <h3>Clap Switch</h3>
                <a href="#" class="btn">قريباً</a>
            </div>
        </div>
    </div>

    <!-- التواصل -->
    <div class="section contact">
        <h2>📬 تواصل معي</h2>

        <a href="mailto:rabeeshalol@gmail.com">📧 البريد الإلكتروني</a>

        <a href="https://www.instagram.com/e.n.g_rs" target="_blank">
            📸 إنستقرام
        </a>
    </div>

</div>

<footer>
    © 2026 ربيع شعلول
</footer>

<script>
    const skills = document.querySelectorAll('.skill-progress');
    window.onload = () => {
        skills.forEach(skill => {
            skill.style.width = skill.getAttribute('data-skill');
        });
    };
</script>

</body>
</html>
